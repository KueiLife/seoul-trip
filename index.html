<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seoul Trip - Olaf Edition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* 1. 整體設計：日系極簡風 
           2. 配色：奶油色 (#FFFDF5) 搭配溫潤的灰褐與深藍
        */
        body { 
            background-color: #FFFDF5; 
            font-family: 'Noto Sans TC', sans-serif; 
            color: #4A4640;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 頁首圓弧設計：極簡柔和的線條 */
        .header-curve { 
            border-radius: 30px 30px 0 0; 
            margin-top: -30px; 
            position: relative; 
            z-index: 10; 
            background-color: #FFFDF5; 
        }

        /* 日系選取狀態：低飽和度的藍 */
        .date-card.active { 
            background-color: #A5B9C7; 
            color: white; 
        }

        .item-card { 
            transition: all 0.3s ease; 
            background-color: #FFFFFF;
            border: 1px solid #F0ECE3;
        }
        
        /* 極簡陰影 */
        .minimal-shadow { box-shadow: 0 4px 12px rgba(180, 170, 150, 0.1); }

        /* 奶油色漸層天氣框 */
        .cream-gradient { 
            background: linear-gradient(135deg, #FFF9E5 0%, #F8F4E1 100%); 
            border: 1px solid #E9E4D4;
        }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen relative pb-24">
        
        <div class="h-[250px] w-full relative overflow-hidden">
            <img src="https://googleusercontent.com/image_generation_content/1" alt="Olaf Banner" class="w-full h-full object-cover">
            
            <div class="absolute bottom-10 right-4 flex space-x-2 z-20">
                <button v-for="tab in tabs" :key="tab.id" @click="currentTab = tab.id" 
                    class="p-2.5 rounded-full shadow-md transition-all border border-white/50"
                    :class="currentTab === tab.id ? 'bg-[#A5B9C7] text-white' : 'bg-white/80 text-[#8E8A82]'">
                    <i :data-lucide="tab.icon" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <div class="header-curve px-5 pt-8 pb-10 min-h-[calc(100vh-220px)]">
            
            <div v-if="currentTab === 'itinerary'">
                
                <div class="cream-gradient rounded-2xl p-4 mb-8 flex items-center justify-between minimal-shadow">
                    <div class="flex items-center">
                        <i data-lucide="cloud-sun" class="text-[#D4A373] mr-3"></i>
                        <div>
                            <p class="text-[10px] text-[#A69F88] font-bold tracking-wider uppercase">Seoul, Korea</p>
                            <p class="text-lg font-bold text-[#5C584F]">1°C <span class="text-xs font-normal text-[#A69F88]">/ Feels like -2°C</span></p>
                        </div>
                    </div>
                    <i data-lucide="refresh-cw" class="w-4 h-4 text-[#C9C4B5]"></i>
                </div>

                <div class="flex overflow-x-auto space-x-3 hide-scrollbar mb-8 py-1">
                    <div v-for="date in travelDates" :key="date.full" @click="selectedDate = date.full"
                        class="date-card min-w-[60px] h-[80px] flex flex-col items-center justify-center rounded-xl cursor-pointer transition-all border border-[#F0ECE3] bg-white"
                        :class="{'active minimal-shadow': selectedDate === date.full}">
                        <span class="text-[10px] font-bold opacity-60 uppercase">{{ date.week }}</span>
                        <span class="text-xl font-bold mt-0.5">{{ date.day }}</span>
                    </div>
                </div>

                <div id="sortable-list" class="space-y-6">
                    <div v-for="(plan, index) in filteredPlans" :key="plan.id" class="relative">
                        
                        <div v-if="plan.type === '航班'" class="bg-[#5C6B73] text-white rounded-2xl p-5 minimal-shadow relative overflow-hidden">
                            <div class="flex justify-between items-center mb-4 opacity-90">
                                <span class="text-xs font-bold tracking-widest">{{ plan.flightNo }}</span>
                                <i data-lucide="plane" class="w-4 h-4"></i>
                            </div>
                            <div class="flex justify
